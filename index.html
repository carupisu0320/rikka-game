<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六華</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: sans-serif;
      background: #2e7d32;
      color: white;
    }

    #field {
      position: relative;
      height: 300px;
      margin: 20px;
      background: #1b5e20;
      border-radius: 10px;
    }

    #hand {
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    #hand img {
      width: 70px;
      margin: 5px;
      cursor: pointer;
    }

    #field img {
      width: 70px;
      position: absolute;
      cursor: pointer;
    }

    button {
      margin: 10px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>六華</h1>

  <div id="field"></div>

  <div id="hand"></div>

  <script src="main.js"></script>
</body>
</html>
