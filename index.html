<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六華（リッカ）オンライン対戦</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d0a08;
    --bg2: #1a1410;
    --bg3: #241c16;
    --surface: #2e2318;
    --surface2: #3d2f1f;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold3: #f5e0a0;
    --red: #d94a3a;
    --red2: #f07060;
    --teal: #4a9e8a;
    --teal2: #6fc4ae;
    --bot-color: #8a6aad;
    --bot-color2: #b08dd4;
    --text: #f0e8d8;
    --text2: #c8b898;
    --text3: #8a7860;
    --border: #4a3828;
    --border2: #6a5030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 10%, rgba(201,168,76,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(74,158,138,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { position: relative; z-index: 1; display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== ロビー ===== */
  #screen-lobby { align-items: center; justify-content: center; padding: 2rem; }

  .title-area { text-align: center; margin-bottom: 2.5rem; }

  .title-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 0.2em;
    text-shadow: 0 0 40px rgba(201,168,76,0.3), 0 2px 8px rgba(0,0,0,0.8);
    line-height: 1;
  }

  .title-ruby { font-size: 0.9rem; letter-spacing: 0.6em; color: var(--text3); text-transform: uppercase; margin-top: 0.4rem; }
  .title-tagline { margin-top: 0.75rem; font-size: 0.8rem; color: var(--text3); letter-spacing: 0.1em; }

  .firework-deco { display: flex; justify-content: center; gap: 1.5rem; margin: 1.2rem 0; }
  .fw-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: 0.6; animation: pulse 2s ease-in-out infinite; }
  .fw-dot:nth-child(2) { animation-delay: 0.3s; background: var(--teal); }
  .fw-dot:nth-child(3) { animation-delay: 0.6s; background: var(--red); }
  .fw-dot:nth-child(4) { animation-delay: 0.9s; background: var(--bot-color); }
  .fw-dot:nth-child(5) { animation-delay: 1.2s; background: var(--teal); }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(1.5);opacity:1} }

  .lobby-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    width: 100%;
    max-width: 460px;
  }

  .form-group { margin-bottom: 1.1rem; }
  .form-label { display: block; font-size: 0.78rem; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 0.4rem; }
  .form-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem 1rem; font-size: 0.95rem;
    color: var(--text); font-family: inherit; transition: border-color 0.2s; outline: none;
  }
  .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }

  .btn {
    display: block; width: 100%; padding: 0.825rem;
    border: none; border-radius: 10px;
    font-family: 'Noto Serif JP', serif; font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, #b8902e 100%); color: #1a1000; }
  .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .btn-secondary { background: var(--surface); color: var(--text2); border: 1px solid var(--border); margin-top: 0.6rem; }
  .btn-secondary:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* プレイヤーリスト */
  .player-list { margin: 1.1rem 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .player-list-header { background: var(--surface); padding: 0.45rem 0.75rem; font-size: 0.73rem; color: var(--text3); letter-spacing: 0.1em; }
  .player-item {
    padding: 0.55rem 0.75rem; font-size: 0.88rem;
    display: flex; align-items: center; gap: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .player-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
  .bot-dot { background: var(--bot-color); }

  .bot-badge {
    font-size: 0.65rem; padding: 1px 5px; border-radius: 3px;
    background: rgba(138,106,173,0.2); color: var(--bot-color2);
    border: 1px solid rgba(138,106,173,0.3); margin-left: auto; white-space: nowrap;
  }

  /* ボット追加パネル */
  .bot-panel {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.875rem;
    margin: 0.875rem 0;
  }

  .bot-panel-title {
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .bot-panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .bot-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

  .difficulty-select {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 0.35rem 0.6rem;
    color: var(--text2); font-size: 0.8rem; font-family: inherit;
    outline: none; cursor: pointer; flex: 1; min-width: 80px;
  }

  .difficulty-select:focus { border-color: var(--bot-color); }

  .btn-add-bot {
    padding: 0.4rem 0.875rem; border-radius: 6px;
    background: rgba(138,106,173,0.15); border: 1px solid rgba(138,106,173,0.4);
    color: var(--bot-color2); font-size: 0.82rem; cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .btn-add-bot:hover { background: rgba(138,106,173,0.25); border-color: var(--bot-color); }

  .btn-remove-bot {
    padding: 0.4rem 0.875rem; border-radius: 6px;
    background: transparent; border: 1px solid var(--border2);
    color: var(--text3); font-size: 0.82rem; cursor: pointer;
    font-family: inherit; transition: all 0.15s; white-space: nowrap;
  }
  .btn-remove-bot:hover { border-color: var(--red2); color: var(--red2); }

  .bot-count-text { font-size: 0.75rem; color: var(--text3); }

  .error-msg { color: var(--red2); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }

  .roles-info { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 0.875rem; font-size: 0.8rem; }
  .role-row { display: flex; justify-content: space-between; align-items: center; padding: 0.28rem 0; border-bottom: 1px solid var(--border); }
  .role-row:last-child { border-bottom: none; }
  .role-name { font-family: 'Noto Serif JP', serif; color: var(--gold2); }
  .role-desc { color: var(--text3); flex: 1; padding: 0 0.75rem; }
  .role-pts { font-weight: 700; color: var(--text); }

  /* ===== ゲーム画面 ===== */
  #screen-game { flex-direction: column; padding: 0; }

  .game-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0.575rem 1.25rem; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
  }

  .game-title-small { font-family: 'Noto Serif JP', serif; font-size: 1.2rem; color: var(--gold2); letter-spacing: 0.2em; }

  .score-board { display: flex; gap: 0.875rem; }
  .score-item { text-align: center; min-width: 54px; }
  .score-name { font-size: 0.65rem; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-name.is-bot { color: var(--bot-color2); }
  .score-val { font-size: 1.05rem; font-weight: 700; color: var(--gold2); }
  .score-item.current-turn .score-name { color: var(--teal2); }
  .score-item.current-turn.is-bot-turn .score-name { color: var(--bot-color2); }

  .game-main { flex: 1; display: flex; flex-direction: column; padding: 0.875rem; gap: 0.875rem; overflow-y: auto; }

  /* 相手エリア */
  .opponents-area { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .opponent-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.575rem 0.875rem;
    flex: 1; min-width: 110px; max-width: 190px;
  }
  .opponent-card.is-turn { border-color: var(--teal); box-shadow: 0 0 12px rgba(74,158,138,0.2); }
  .opponent-card.is-bot.is-turn { border-color: var(--bot-color); box-shadow: 0 0 12px rgba(138,106,173,0.25); }

  .opponent-name { font-size: 0.77rem; color: var(--text3); margin-bottom: 0.22rem; display: flex; align-items: center; gap: 0.35rem; }
  .opponent-name.is-bot { color: var(--bot-color2); }

  .turn-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: blink 1s ease-in-out infinite; }
  .turn-indicator.bot-turn { background: var(--bot-color); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ボット思考中アニメ */
  .bot-thinking {
    font-size: 0.65rem; color: var(--bot-color2);
    display: flex; align-items: center; gap: 3px;
  }
  .think-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--bot-color); animation: thinkpulse 1.2s ease-in-out infinite; }
  .think-dot:nth-child(2) { animation-delay: 0.2s; }
  .think-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinkpulse { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  .opponent-tiles { display: flex; gap: 2px; flex-wrap: wrap; }
  .tile-back { width: 20px; height: 34px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border2); }

  /* 場エリア */
  .field-area { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.875rem; }
  .field-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.625rem; }
  .field-label { font-size: 0.73rem; color: var(--text3); letter-spacing: 0.1em; }
  .stock-info { font-size: 0.73rem; color: var(--text2); }
  .field-tiles { display: flex; gap: 6px; flex-wrap: wrap; min-height: 52px; }

  /* 牌 */
  .tile {
    width: 34px; height: 58px; border-radius: 6px;
    background: var(--surface); border: 1.5px solid var(--border2);
    display: flex; flex-direction: column; position: relative;
    cursor: pointer; transition: all 0.15s; user-select: none; overflow: hidden;
  }
  .tile:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.5); }
  .tile.selected { border-color: var(--gold); box-shadow: 0 0 12px rgba(201,168,76,0.4); transform: translateY(-8px); }
  .tile.field-tile:hover { border-color: var(--teal); transform: translateY(-4px); box-shadow: 0 6px 16px rgba(74,158,138,0.3); }

  .tile-half { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; line-height: 1; }
  .tile-top { border-bottom: 1px solid var(--border); }

  .sym-1{color:#e86060} .sym-2{color:#e8a060} .sym-3{color:#e8d060}
  .sym-4{color:#60e880} .sym-5{color:#60a0e8} .sym-6{color:#a060e8}

  /* アクション */
  .action-area { display: flex; gap: 0.75rem; align-items: center; justify-content: center; }
  .btn-draw {
    flex: 1; max-width: 190px; padding: 0.7rem 1rem;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text2); font-size: 0.88rem;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-draw:hover:not(:disabled) { border-color: var(--teal); color: var(--teal2); box-shadow: 0 4px 12px rgba(74,158,138,0.2); }
  .btn-draw:disabled { opacity: 0.3; cursor: not-allowed; }

  .status-text { text-align: center; font-size: 0.83rem; color: var(--text3); padding: 0.5rem; }
  .my-turn-text { color: var(--teal2); font-weight: 500; }

  /* 手牌 */
  .my-hand-area { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 0.875rem; }
  .my-hand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.625rem; flex-wrap: wrap; gap: 0.5rem; }
  .my-hand-label { font-size: 0.73rem; color: var(--text3); letter-spacing: 0.1em; }
  .hand-actions { display: flex; gap: 0.4rem; }

  .btn-small {
    padding: 0.28rem 0.7rem; border: 1px solid var(--border2);
    border-radius: 6px; background: var(--surface); color: var(--text2);
    font-size: 0.73rem; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-small:hover { background: var(--surface2); border-color: var(--gold); color: var(--gold2); }
  .btn-win { background: linear-gradient(135deg, var(--gold) 0%, #b8902e 100%); color: #1a1000; font-weight: 700; border: none; letter-spacing: 0.05em; }
  .btn-win:hover { box-shadow: 0 4px 14px rgba(201,168,76,0.4); transform: translateY(-1px); }

  .my-tiles { display: flex; gap: 7px; flex-wrap: wrap; }
  .tile-wrapper { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tile-flip-btn {
    font-size: 0.58rem; color: var(--text3); cursor: pointer;
    padding: 1px 3px; border: 1px solid var(--border); border-radius: 3px;
    background: transparent; font-family: inherit; transition: all 0.15s;
  }
  .tile-flip-btn:hover { color: var(--gold2); border-color: var(--gold); }

  /* モーダル */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 16px; padding: 1.75rem; max-width: 460px;
    width: 90%; text-align: center; animation: modalIn 0.3s ease-out;
  }
  @keyframes modalIn { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-title { font-family: 'Noto Serif JP', serif; font-size: 1.4rem; color: var(--gold2); margin-bottom: 0.4rem; letter-spacing: 0.1em; }
  .win-role { font-size: 1.8rem; font-family: 'Noto Serif JP', serif; color: var(--gold3); margin: 0.4rem 0; }
  .win-points { font-size: 0.95rem; color: var(--text2); margin-bottom: 1.25rem; }
  .win-hand { display: flex; gap: 5px; justify-content: center; margin: 0.875rem 0; flex-wrap: wrap; }
  .score-table { width: 100%; border-collapse: collapse; margin: 0.875rem 0; font-size: 0.88rem; }
  .score-table td { padding: 0.38rem 0.7rem; border-bottom: 1px solid var(--border); }
  .score-table td:last-child { text-align: right; color: var(--gold2); font-weight: 700; }
  .score-table .bot-row td:first-child { color: var(--bot-color2); }

  @keyframes spin { to{transform:rotate(360deg)} }

  @media (max-width: 600px) {
    .game-header { padding: 0.45rem 0.75rem; }
    .game-title-small { font-size: 1rem; }
    .tile { width: 28px; height: 48px; }
    .tile-half { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<!-- ===== ロビー ===== -->
<div id="screen-lobby" class="screen active">
  <div class="title-area">
    <div class="title-kanji">六華</div>
    <div class="title-ruby">R I K K A</div>
    <div class="firework-deco">
      <div class="fw-dot"></div><div class="fw-dot"></div><div class="fw-dot"></div>
      <div class="fw-dot"></div><div class="fw-dot"></div>
    </div>
    <div class="title-tagline">麻雀の体験をシンプルに再構築した牌ゲーム</div>
  </div>

  <div class="lobby-card">
    <div id="lobby-form">
      <div class="form-group">
        <label class="form-label">プレイヤー名</label>
        <input type="text" id="input-name" class="form-input" placeholder="名前を入力" maxlength="12">
      </div>
      <div class="form-group">
        <label class="form-label">ルームID（ひとりで遊ぶ場合は空欄でOK）</label>
        <input type="text" id="input-room" class="form-input" placeholder="ルームIDを入力（英数字）" maxlength="20">
      </div>
      <button class="btn btn-primary" onclick="joinRoom()">ルームに参加</button>
      <button class="btn btn-secondary" onclick="createRandomRoom()">新しいルームを作成</button>
      <div id="lobby-error" class="error-msg"></div>
    </div>

    <div id="waiting-room" style="display:none">
      <!-- プレイヤーリスト -->
      <div class="player-list">
        <div class="player-list-header">参加中のプレイヤー</div>
        <div id="waiting-players"></div>
      </div>

      <!-- ボット追加パネル -->
      <div class="bot-panel">
        <div class="bot-panel-title">AIボットを追加</div>
        <div class="bot-controls">
          <select id="bot-difficulty" class="difficulty-select">
            <option value="easy">弱（ゆっくり）</option>
            <option value="normal" selected>普通</option>
            <option value="hard">強（速い）</option>
          </select>
          <button class="btn-add-bot" onclick="addBot()">+ ボット追加</button>
          <button class="btn-remove-bot" onclick="removeBot()">− 削除</button>
        </div>
        <div id="bot-count-text" class="bot-count-text" style="margin-top:0.5rem"></div>
      </div>

      <div style="font-size:0.78rem;color:var(--text3);margin-bottom:0.875rem;text-align:center">
        ルームID: <span id="display-room-id" style="color:var(--gold2);font-weight:700"></span>
        <br><span style="font-size:0.72rem">このIDを友達に共有して一緒に遊べます</span>
      </div>
      <button class="btn btn-primary" id="btn-start" onclick="startGame()" disabled>ゲームを開始</button>
      <button class="btn btn-secondary" onclick="leaveRoom()">ルームを退出</button>
      <div id="waiting-error" class="error-msg"></div>
    </div>

    <div style="margin-top:1.25rem">
      <div class="roles-info">
        <div style="font-size:0.73rem;color:var(--text3);margin-bottom:0.45rem;letter-spacing:0.1em">— 役の種類 —</div>
        <div class="role-row">
          <span class="role-name">六華</span>
          <span class="role-desc">6枚全て同じ数字</span>
          <span class="role-pts">6点</span>
        </div>
        <div class="role-row">
          <span class="role-name">三連</span>
          <span class="role-desc">3連続×2組（例:2,3,4,2,3,4）</span>
          <span class="role-pts">3点</span>
        </div>
        <div class="role-row">
          <span class="role-name">一色</span>
          <span class="role-desc">上か下が全て同じ数字</span>
          <span class="role-pts">2点</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="game-title-small">六華</div>
    <div id="score-board" class="score-board"></div>
    <div style="font-size:0.72rem;color:var(--text3)">10点先取</div>
  </div>

  <div class="game-main">
    <div id="opponents-area" class="opponents-area"></div>

    <div class="field-area">
      <div class="field-header">
        <div class="field-label">— 場 —</div>
        <div id="stock-count" class="stock-info"></div>
      </div>
      <div id="field-tiles" class="field-tiles">
        <div style="color:var(--text3);font-size:0.8rem;padding:0.5rem">場に牌はありません</div>
      </div>
    </div>

    <div class="action-area">
      <button id="btn-draw-stock" class="btn-draw" onclick="drawFromStock()">山からツモ</button>
      <div id="status-text" class="status-text"></div>
    </div>

    <div class="my-hand-area">
      <div class="my-hand-header">
        <div class="my-hand-label">— 手牌 —</div>
        <div class="hand-actions">
          <button class="btn-small btn-win" onclick="declareWin()">上がる！</button>
          <button class="btn-small" onclick="discardSelected()">選択牌を捨てる</button>
        </div>
      </div>
      <div id="my-tiles" class="my-tiles"></div>
      <div id="hand-hint" style="font-size:0.73rem;color:var(--text3);margin-top:0.45rem"></div>
    </div>
  </div>
</div>

<!-- ===== モーダル ===== -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div id="modal-content" class="modal"></div>
</div>

<script>
let ws = null;
let myName = '';
let myIndex = -1;
let gameState = null;
let selectedTile = null;
let roomId = '';

const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${wsProtocol}//${location.host}`;

function connectWS() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {};
  ws.onmessage = (e) => handleServerMessage(JSON.parse(e.data));
  ws.onclose = () => {
    setTimeout(() => {
      if (document.getElementById('screen-game').classList.contains('active')) {
        showModal(`<div class="modal-title">接続が切断されました</div>
          <p style="color:var(--text2);margin:1rem 0">サーバーとの接続が失われました</p>
          <button class="btn btn-primary" style="margin-top:1rem" onclick="location.reload()">再接続</button>`);
      }
    }, 500);
  };
}

const symbols = ['', '✦', '✿', '◈', '✺', '⬡', '❋'];
const symClass = ['', 'sym-1', 'sym-2', 'sym-3', 'sym-4', 'sym-5', 'sym-6'];

function renderTile(tile, opts = {}) {
  const topVal = tile.flipped ? tile.bottom : tile.top;
  const bottomVal = tile.flipped ? tile.top : tile.bottom;
  const selected = opts.selected ? ' selected' : '';
  const fieldCls = opts.field ? ' field-tile' : '';
  const onClick = opts.onClick || '';
  return `<div class="tile${selected}${fieldCls}" onclick="${onClick}" data-id="${tile.id}">
    <div class="tile-half tile-top ${symClass[topVal]}">${symbols[topVal]}</div>
    <div class="tile-half ${symClass[bottomVal]}">${symbols[bottomVal]}</div>
  </div>`;
}

// ===== メッセージハンドラー =====
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'joined':
      roomId = msg.roomId;
      document.getElementById('display-room-id').textContent = roomId;
      document.getElementById('lobby-form').style.display = 'none';
      document.getElementById('waiting-room').style.display = 'block';
      break;

    case 'lobby': {
      const ul = document.getElementById('waiting-players');
      ul.innerHTML = msg.players.map(p => {
        const isBot = p.isBot;
        const diffLabel = { easy: '弱', normal: '普通', hard: '強' }[p.difficulty] || '';
        const badge = isBot ? `<span class="bot-badge">AI ${diffLabel}</span>` : '';
        return `<div class="player-item">
          <div class="player-dot ${isBot ? 'bot-dot' : ''}"></div>
          ${p.name}${badge}
        </div>`;
      }).join('');
      document.getElementById('btn-start').disabled = !msg.canStart;
      const botCount = msg.players.filter(p => p.isBot).length;
      const humanCount = msg.players.filter(p => !p.isBot).length;
      document.getElementById('bot-count-text').textContent =
        `現在: 人間 ${humanCount}人 / AI ${botCount}体 (最大5人まで)`;
      break;
    }

    case 'gameStart':
      showScreen('game');
      break;

    case 'gameState':
      myIndex = msg.myIndex;
      gameState = msg;
      renderGameState(msg);
      break;

    case 'win':
      showWinModal(msg);
      break;

    case 'gameOver':
      showGameOverModal(msg);
      break;

    case 'error': {
      const errEl = document.getElementById('waiting-error') ||
                    document.getElementById('lobby-error');
      if (errEl) errEl.textContent = msg.message;
      break;
    }

    case 'playerLeft':
      showModal(`<div class="modal-title">プレイヤーが退出しました</div>
        <p style="color:var(--text2);margin:1rem 0">${msg.name} が退出しました</p>
        <button class="btn btn-secondary" style="margin-top:1rem" onclick="closeModal()">閉じる</button>`);
      break;
  }
}

// ===== ゲーム描画 =====
function renderGameState(state) {
  // スコアボード
  const sb = document.getElementById('score-board');
  sb.innerHTML = state.scores.map((s, i) => {
    const isCurrent = i === state.currentTurn;
    const isBotTurn = isCurrent && state.scores[i].isBot;
    return `<div class="score-item ${isCurrent ? 'current-turn' : ''} ${isBotTurn ? 'is-bot-turn' : ''}">
      <div class="score-name ${s.isBot ? 'is-bot' : ''}">${s.name.length > 6 ? s.name.slice(0,5)+'…' : s.name}</div>
      <div class="score-val">${s.score}</div>
    </div>`;
  }).join('');

  // 相手プレイヤー
  const oa = document.getElementById('opponents-area');
  oa.innerHTML = state.opponents.map(opp => {
    const botClass = opp.isBot ? ' is-bot' : '';
    const turnClass = opp.isCurrentTurn ? ' is-turn' : '';
    const indicator = opp.isCurrentTurn
      ? `<div class="turn-indicator ${opp.isBot ? 'bot-turn' : ''}"></div>`
      : '';
    const thinking = opp.isBot && opp.isCurrentTurn
      ? `<div class="bot-thinking"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>`
      : '';
    const diffLabel = { easy: '弱', normal: '普通', hard: '強' }[opp.difficulty] || '';
    const botTag = opp.isBot ? `<span style="font-size:0.6rem;color:var(--bot-color2);margin-left:2px">[AI${diffLabel}]</span>` : '';
    return `<div class="opponent-card${botClass}${turnClass}">
      <div class="opponent-name ${opp.isBot ? 'is-bot' : ''}">
        ${indicator}${opp.name}${botTag}
        <span style="font-size:0.68rem;color:var(--gold2);margin-left:auto">${opp.score}点</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="opponent-tiles">
          ${Array(opp.handCount).fill(0).map(() => '<div class="tile-back"></div>').join('')}
        </div>
        ${thinking}
      </div>
    </div>`;
  }).join('');

  // 場の牌
  const ft = document.getElementById('field-tiles');
  if (state.fieldFaceUp.length === 0) {
    ft.innerHTML = '<div style="color:var(--text3);font-size:0.8rem;padding:0.5rem">場に牌はありません</div>';
  } else {
    ft.innerHTML = state.fieldFaceUp.map(tile =>
      renderTile(tile, { field: true, onClick: `pickFromField('${tile.id}')` })
    ).join('');
  }

  document.getElementById('stock-count').textContent =
    `山: ${state.stockCount}枚 / 場(裏): ${state.fieldFaceDownCount}枚`;

  // 手牌
  const mt = document.getElementById('my-tiles');
  mt.innerHTML = state.myHand.map(tile => `
    <div class="tile-wrapper">
      ${renderTile(tile, { selected: selectedTile === tile.id, onClick: `selectTile('${tile.id}')` })}
      <button class="tile-flip-btn" onclick="flipTile('${tile.id}')">反転</button>
    </div>
  `).join('');

  // アクション状態
  const isMyTurn = state.currentTurn === myIndex;
  const drawBtn = document.getElementById('btn-draw-stock');
  const statusEl = document.getElementById('status-text');

  if (isMyTurn) {
    if (state.myHand.length === 5) {
      drawBtn.disabled = false;
      statusEl.innerHTML = '<span class="my-turn-text">あなたの番 — 牌を引いてください</span>';
    } else {
      drawBtn.disabled = true;
      statusEl.innerHTML = '<span class="my-turn-text">捨てる牌を選択 → 「捨てる」か「上がる！」</span>';
    }
  } else {
    drawBtn.disabled = true;
    const cur = state.scores[state.currentTurn];
    if (cur && cur.isBot) {
      statusEl.innerHTML = `<span style="color:var(--bot-color2)">${cur.name} が考え中...</span>`;
    } else {
      statusEl.textContent = `${cur ? cur.name : '相手'} の番です...`;
    }
  }

  // 役プレビュー
  const hint = checkWinLocal(state.myHand);
  document.getElementById('hand-hint').textContent =
    hint.won ? `★ 役あり: ${hint.role}（${hint.points}点）— 上がれます！` : '役なし（まだ完成していません）';
}

// ===== ローカル役チェック =====
function checkWinLocal(hand) {
  if (hand.length < 6) return { won: false };
  const values = hand.map(t => t.flipped ? t.bottom : t.top);
  if (values.every(v => v === values[0])) return { won: true, role: '六華', points: 6 };
  const sorted = [...values].sort((a, b) => a - b);
  if (isThreeStraightLocal(sorted)) return { won: true, role: '三連', points: 3 };
  const top = hand.map(t => t.top);
  const bottom = hand.map(t => t.bottom);
  if (top.every(v => v === top[0]) || bottom.every(v => v === bottom[0])) return { won: true, role: '一色', points: 2 };
  return { won: false };
}

function isThreeStraightLocal(sorted) {
  if (sorted.length !== 6) return false;
  const counts = {};
  sorted.forEach(v => counts[v] = (counts[v] || 0) + 1);
  const vals = Object.keys(counts).map(Number).sort((a, b) => a - b);
  if (vals.length === 3 && vals.every(v => counts[v] === 2)) {
    return vals[1] === vals[0] + 1 && vals[2] === vals[1] + 1;
  }
  return false;
}

// ===== アクション =====
function selectTile(id) {
  selectedTile = selectedTile === id ? null : id;
  if (gameState) renderGameState(gameState);
}

function flipTile(id) { ws.send(JSON.stringify({ type: 'flipTile', tileId: id })); }
function drawFromStock() { ws.send(JSON.stringify({ type: 'drawFromStock' })); }

function pickFromField(id) {
  if (!gameState) return;
  if (gameState.currentTurn !== myIndex) return;
  if (gameState.myHand.length >= 6) return;
  ws.send(JSON.stringify({ type: 'drawFromField', tileId: id }));
}

function discardSelected() {
  if (!selectedTile) { showToast('捨てる牌を選択してください'); return; }
  ws.send(JSON.stringify({ type: 'discard', tileId: selectedTile }));
  selectedTile = null;
}

function declareWin() { ws.send(JSON.stringify({ type: 'declareWin' })); }

// ===== ロビー =====
function joinRoom() {
  const name = document.getElementById('input-name').value.trim();
  let room = document.getElementById('input-room').value.trim();
  if (!name) { document.getElementById('lobby-error').textContent = 'プレイヤー名を入力してください'; return; }
  if (!room) room = Math.random().toString(36).substring(2, 8).toUpperCase();
  document.getElementById('input-room').value = room;
  myName = name;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    connectWS();
    ws.addEventListener('open', () => {
      ws.send(JSON.stringify({ type: 'join', roomId: room, playerName: name }));
    }, { once: true });
  } else {
    ws.send(JSON.stringify({ type: 'join', roomId: room, playerName: name }));
  }
}

function createRandomRoom() {
  document.getElementById('input-room').value = '';
  joinRoom();
}

function addBot() {
  const diff = document.getElementById('bot-difficulty').value;
  ws.send(JSON.stringify({ type: 'addBot', difficulty: diff }));
}

function removeBot() {
  ws.send(JSON.stringify({ type: 'removeBot' }));
}

function leaveRoom() { if (ws) ws.close(); location.reload(); }
function startGame() { ws.send(JSON.stringify({ type: 'startGame' })); }

// ===== モーダル =====
function showWinModal(msg) {
  const hand = msg.hand || [];
  const isBot = msg.isBot;
  const emoji = isBot ? '🤖' : '🎆';
  const subtitle = isBot
    ? `<p style="color:var(--bot-color2);font-size:0.88rem">${msg.player} (AI) が完成</p>`
    : `<p style="color:var(--text2);font-size:0.88rem">${msg.player} が完成</p>`;
  showModal(`
    <div class="modal-title">${emoji} 上がり！</div>
    ${subtitle}
    <div class="win-role">${msg.role}</div>
    <div class="win-points">+${msg.points}点</div>
    <div class="win-hand">${hand.map(t => renderTile(t, {})).join('')}</div>
    <table class="score-table">
      ${msg.scores.map(s => `<tr class="${s.isBot ? 'bot-row' : ''}"><td>${s.name}</td><td>${s.score}点</td></tr>`).join('')}
    </table>
    <button class="btn btn-primary" style="margin-top:0.5rem" onclick="nextRound()">次のゲームへ</button>
  `);
}

function showGameOverModal(msg) {
  const isBot = msg.isBot;
  const winMsg = isBot
    ? `<div style="font-size:1.1rem;color:var(--bot-color2);margin:0.625rem 0">AI（${msg.winner}）の勝利...</div>`
    : `<div style="font-size:1.4rem;color:var(--gold3);margin:0.625rem 0;font-family:'Noto Serif JP',serif">${msg.winner} の勝利！</div>`;
  showModal(`
    <div class="modal-title">🏆 ゲーム終了！</div>
    ${winMsg}
    <table class="score-table">
      ${msg.scores.map(s => `<tr class="${s.isBot ? 'bot-row' : ''}"><td>${s.name}</td><td>${s.score}点</td></tr>`).join('')}
    </table>
    <button class="btn btn-primary" style="margin-top:0.875rem" onclick="location.reload()">もう一度</button>
  `);
}

function nextRound() { closeModal(); ws.send(JSON.stringify({ type: 'nextRound' })); }
function showModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal-overlay').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--border2);border-radius:8px;
    padding:0.7rem 1.4rem;color:var(--text2);font-size:0.83rem;z-index:200;
    animation:modalIn 0.2s ease-out`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}

connectWS();
</script>
