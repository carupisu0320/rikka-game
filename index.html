<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六華</title>

  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: sans-serif;
      background: #2e7d32;
      color: white;
    }

    #field {
      position: relative;
      height: 320px;
      margin: 20px;
      background: #1b5e20;
      border-radius: 10px;
    }

    #hand {
      position: fixed;
      bottom: 10px;
      width: 100%;
    }

    .card {
      width: 60px;
      height: 100px;
      background: white;
      border-radius: 10px;
      border: 2px solid black;
      display: inline-flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      margin: 5px;
      font-weight: bold;
      cursor: pointer;
    }

    .back {
      background: gray;
    }

    #field .card {
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>六華</h1>

  <div id="field"></div>
  <div id="hand"></div>

  <script src="main.js"></script>
</body>
</html>
