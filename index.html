<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六華（リッカ）</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Hiragino Sans','Yu Gothic UI','Noto Sans JP',sans-serif;
  background:#0d0a08;color:#f0e8d8;
  user-select:none;height:100vh;
}

/* ── SCREENS ── */
.screen{display:none;width:100vw;height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── LOBBY ── */
#lobby{
  align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.09) 0%,transparent 60%);
  overflow-y:auto;
}
.lobby-inner{width:100%;max-width:420px;padding:2rem 1.5rem}

.logo{text-align:center;margin-bottom:1.75rem}
.logo-kanji{
  font-size:clamp(3.5rem,12vw,6rem);font-weight:700;
  color:#e8c97a;letter-spacing:.25em;line-height:1;
  text-shadow:0 0 40px rgba(201,168,76,.4),0 2px 8px rgba(0,0,0,.8);
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
}
.logo-sub{font-size:.78rem;letter-spacing:.55em;color:#6a5830;margin-top:.3rem;text-transform:uppercase}

.sparks{display:flex;justify-content:center;gap:9px;margin:.9rem 0}
.sp{width:7px;height:7px;border-radius:50%;animation:sp 2s infinite}
.sp:nth-child(1){background:#f06060;animation-delay:0s}
.sp:nth-child(2){background:#f0a060;animation-delay:.25s}
.sp:nth-child(3){background:#d4c040;animation-delay:.5s}
.sp:nth-child(4){background:#50c870;animation-delay:.75s}
.sp:nth-child(5){background:#60a8f0;animation-delay:1s}
.sp:nth-child(6){background:#a070e8;animation-delay:1.25s}
@keyframes sp{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.7);opacity:1}}

.flabel{display:block;font-size:.73rem;color:#6a5830;letter-spacing:.1em;margin-bottom:.35rem}
.finput{
  width:100%;background:#1a1410;border:1px solid #3e2e1e;border-radius:8px;
  padding:.65rem .9rem;font-size:.95rem;color:#f0e8d8;font-family:inherit;
  outline:none;transition:border-color .18s;
}
.finput:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}

.fgroup{margin-bottom:.9rem}

.bot-row{display:flex;gap:.5rem}
.fselect{
  flex:1;background:#1a1410;border:1px solid #3e2e1e;border-radius:8px;
  padding:.6rem .75rem;color:#c8b898;font-size:.85rem;font-family:inherit;outline:none;cursor:pointer;
}
.fselect:focus{border-color:#8a6aad}

.lbtn{
  display:block;width:100%;padding:.8rem;border:none;border-radius:10px;
  font-family:inherit;font-size:.95rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .18s;
}
.lbtn-gold{background:linear-gradient(135deg,#c9a84c,#a07020);color:#160e00}
.lbtn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.35)}
.btn-group{display:flex;flex-direction:column;gap:.5rem;margin-top:1rem}

.rules-card{
  background:#141008;border:1px solid #3e2e1e;border-radius:10px;
  padding:.875rem;margin-top:1.25rem;font-size:.77rem;
}
.rules-title{color:#6a5830;letter-spacing:.1em;margin-bottom:.5rem}
.rrow{display:flex;align-items:center;padding:.24rem 0;border-bottom:1px solid #221810}
.rrow:last-child{border-bottom:none}
.rname{font-family:'Hiragino Mincho ProN','Yu Mincho',serif;color:#e8c97a;min-width:2.5rem}
.rdesc{color:#6a5830;flex:1;padding:0 .6rem}
.rpts{font-weight:700;color:#f0e8d8;min-width:2rem;text-align:right}
.rnote{margin-top:.6rem;font-size:.68rem;color:#5a4820}

/* ── GAME SCREEN ── */
#game{background:#0d0a08}

/* Header */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.45rem 1rem;background:#120e0a;border-bottom:1px solid #221810;
  flex-shrink:0;min-height:46px;
}
.hdr-logo{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:1.25rem;color:#e8c97a;letter-spacing:.2em;
}
#scoreboard{display:flex;gap:.5rem;flex-wrap:wrap}
.spill{
  background:#1e1612;border:1px solid #3e2e1e;border-radius:16px;
  padding:.18rem .65rem;font-size:.7rem;display:flex;align-items:center;gap:.35rem;
  transition:border-color .3s,box-shadow .3s;
}
.spill.active-human{border-color:#4a9e8a;box-shadow:0 0 8px rgba(74,158,138,.25)}
.spill.active-bot{border-color:#8a6aad;box-shadow:0 0 8px rgba(138,106,173,.25)}
.spill .sn{color:#6a5830;max-width:5rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spill .sv{color:#e8c97a;font-weight:700;font-size:.82rem}

/* Opponents */
#opp-area{
  display:flex;gap:.45rem;padding:.45rem 1rem;
  flex-shrink:0;flex-wrap:wrap;
  min-height:0;
}
.ocard{
  background:#141008;border:1px solid #2a1e12;border-radius:8px;
  padding:.3rem .7rem;display:flex;align-items:center;gap:.45rem;
  font-size:.76rem;flex:1;min-width:90px;max-width:200px;
  transition:border-color .3s;
}
.ocard.oactive{border-color:#8a6aad;box-shadow:0 0 10px rgba(138,106,173,.2)}
.oname{color:#b08dd4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.ohand{display:flex;gap:2px;flex-wrap:wrap}
.tback{width:13px;height:22px;background:#2a1e12;border:1px solid #3a2a1a;border-radius:2px;flex-shrink:0}
.oscore{margin-left:auto;color:#e8c97a;font-weight:700;white-space:nowrap}
.tdots{display:flex;gap:2px;margin-left:3px}
.tdot{width:4px;height:4px;border-radius:50%;background:#8a6aad;animation:tdot 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1.1);opacity:1}}

/* Field */
#field-wrap{flex:1;overflow-y:auto;padding:.5rem 1rem;border-bottom:1px solid #1a1208}
.field-hdr{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.7rem;color:#6a5830;letter-spacing:.1em;margin-bottom:.45rem;
}
#field-grid{display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}

/* Tile base */
.tile{
  width:34px;height:58px;border-radius:5px;
  background:#1e1612;border:1.5px solid #3a2a1a;
  display:flex;flex-direction:column;cursor:pointer;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  position:relative;overflow:hidden;flex-shrink:0;
}
.tile .th,.tile .tb{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;line-height:1;pointer-events:none;
}
.tile .th{border-bottom:1px solid #3a2a1a}

/* Field tile hover */
.tile.pickable:hover{border-color:#4a9e8a;transform:translateY(-4px);box-shadow:0 6px 16px rgba(74,158,138,.3)}
.tile.not-pick{cursor:default;opacity:.75}

/* Hand tile */
.htile{width:44px;height:74px}
.htile .th,.htile .tb{font-size:1.18rem}
.htile:hover{border-color:#c9a84c;transform:translateY(-4px);box-shadow:0 6px 16px rgba(201,168,76,.25)}
.htile.selected{
  border-color:#ff4040 !important;
  box-shadow:0 0 18px rgba(255,60,60,.75),0 0 6px rgba(255,60,60,.5) !important;
  transform:translateY(-10px) !important;
}

/* Sym colors */
.s1{color:#f06868}.s2{color:#f0a050}.s3{color:#d4c030}
.s4{color:#50c870}.s5{color:#58a8f0}.s6{color:#a870e8}

/* Hand area */
#hand-area{
  flex-shrink:0;background:#0a0806;border-top:1px solid #221810;
  padding:.5rem 1rem .6rem;
}
.hand-hdr{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.35rem;
}
.hand-label{font-size:.7rem;color:#6a5830;letter-spacing:.1em}
#hand-hint{font-size:.72rem;color:#6a5830}
#hand-hint.can-win{color:#c9a84c;font-weight:700}

#status{
  font-size:.78rem;text-align:center;padding:.22rem 0 .35rem;
  min-height:22px;color:#6a5830;
}
#status.myturn{color:#6fc4ae}
#status.boturn{color:#b08dd4}

.hand-row{display:flex;align-items:flex-end;gap:.6rem}
#hand-tiles{display:flex;gap:5px;flex:1;min-width:0}
#hand-btns{display:flex;flex-direction:column;gap:.35rem;flex-shrink:0}

.abtn{
  padding:.4rem .85rem;border-radius:7px;border:none;
  font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.abtn:disabled{opacity:.35;cursor:not-allowed !important;transform:none !important}
#btn-discard{
  background:#7a1818;color:#ffd0d0;
  display:none; /* shown via JS */
}
#btn-discard:hover:not(:disabled){background:#a02020}
#btn-win{background:linear-gradient(135deg,#c9a84c,#a07020);color:#160e00}
#btn-win:hover:not(:disabled){box-shadow:0 4px 14px rgba(201,168,76,.4);transform:translateY(-1px)}

/* Toast */
#toast{
  position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#3a2010;border:1px solid #6a4020;border-radius:9px;
  padding:.65rem 1.25rem;font-size:.88rem;color:#f0d8b0;z-index:300;
  pointer-events:none;opacity:0;transition:opacity .22s,transform .22s;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Modal */
#modal{
  position:fixed;inset:0;background:rgba(0,0,0,.87);
  display:none;align-items:center;justify-content:center;z-index:200;
  backdrop-filter:blur(3px);
}
#modal.open{display:flex}
.mbox{
  background:#1a1410;border:1px solid #4a3018;border-radius:16px;
  padding:1.75rem;max-width:400px;width:90%;text-align:center;
  animation:mboxin .25s ease-out;
}
@keyframes mboxin{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.mtitle{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:1.4rem;color:#e8c97a;margin-bottom:.3rem;
}
.mrole{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:2.1rem;color:#f5e0a0;margin:.3rem 0;
}
.mpts{color:#a89878;margin-bottom:.9rem;font-size:.9rem}
.mhand{display:flex;gap:5px;justify-content:center;margin:.75rem 0;flex-wrap:wrap}
.mscores{width:100%;border-collapse:collapse;margin:.7rem 0;font-size:.87rem}
.mscores td{padding:.3rem .6rem;border-bottom:1px solid #2a1e12}
.mscores td:last-child{text-align:right;color:#e8c97a;font-weight:700}
.mbtn{
  display:block;width:100%;padding:.75rem;border:none;border-radius:9px;
  font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#c9a84c,#a07020);color:#160e00;
  margin-top:.75rem;transition:all .15s;letter-spacing:.06em;
}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(201,168,76,.35)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#3a2a1a;border-radius:2px}

@media(max-width:480px){
  .htile{width:38px;height:64px}
  .htile .th,.htile .tb{font-size:1rem}
  .tile{width:28px;height:48px}
  .tile .th,.tile .tb{font-size:.82rem}
}
</style>
</head>
<body>

<!-- ====== LOBBY ====== -->
<div id="lobby" class="screen active">
<div class="lobby-inner">
  <div class="logo">
    <div class="logo-kanji">六華</div>
    <div class="logo-sub">R I K K A</div>
  </div>
  <div class="sparks">
    <div class="sp"></div><div class="sp"></div><div class="sp"></div>
    <div class="sp"></div><div class="sp"></div><div class="sp"></div>
  </div>

  <div class="fgroup">
    <label class="flabel">あなたの名前</label>
    <input id="pname" class="finput" type="text" value="プレイヤー" maxlength="10">
  </div>
  <div class="fgroup">
    <label class="flabel">AIボット数 / 強さ</label>
    <div class="bot-row">
      <select id="bcnt" class="fselect">
        <option value="1" selected>1体</option>
        <option value="2">2体</option>
        <option value="3">3体</option>
        <option value="4">4体</option>
      </select>
      <select id="bdiff" class="fselect">
        <option value="easy">弱い</option>
        <option value="normal" selected>普通</option>
        <option value="hard">強い</option>
      </select>
    </div>
  </div>
  <div class="btn-group">
    <button class="lbtn lbtn-gold" onclick="startGame()">ゲームスタート</button>
  </div>

  <div class="rules-card">
    <div class="rules-title">— 役の種類（10点先取で勝利）—</div>
    <div class="rrow"><span class="rname">六華</span><span class="rdesc">6枚すべて同じ数字（反転後で判定）</span><span class="rpts">6点</span></div>
    <div class="rrow"><span class="rname">三連</span><span class="rdesc">3連続×2組　例: 2,2,3,3,4,4</span><span class="rpts">3点</span></div>
    <div class="rrow"><span class="rname">一色</span><span class="rdesc">上面か下面がすべて同じ数字</span><span class="rpts">2点</span></div>
    <div class="rnote">🖱 右クリック（スマホ長押し）で牌を反転　/ 牌をクリックして選択、別の牌をクリックで並び替え</div>
  </div>
</div>
</div>

<!-- ====== GAME ====== -->
<div id="game" class="screen">
  <div id="hdr">
    <div class="hdr-logo">六華</div>
    <div id="scoreboard"></div>
    <div style="font-size:.68rem;color:#5a4820">10点先取</div>
  </div>

  <div id="opp-area"></div>

  <div id="field-wrap">
    <div class="field-hdr">
      <span>— 場の牌 —</span>
      <span id="field-cnt"></span>
    </div>
    <div id="field-grid"></div>
  </div>

  <div id="hand-area">
    <div class="hand-hdr">
      <span class="hand-label">— 手牌 —</span>
      <span id="hand-hint"></span>
    </div>
    <div id="status"></div>
    <div class="hand-row">
      <div id="hand-tiles"></div>
      <div id="hand-btns">
        <button id="btn-discard" class="abtn" onclick="doDiscard()">捨てる</button>
        <button id="btn-win"     class="abtn" onclick="doWin()" disabled>上がる！</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="modal"><div class="mbox" id="mbox"></div></div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const SYM       = ['','✦','✿','◈','✺','⬡','❋'];
const SCLS      = ['','s1','s2','s3','s4','s5','s6'];
const BNAMES    = ['AIさくら','AIあおい','AIひなた','AIつばき'];
const WIN_SCORE = 10;

// ============================================================
//  GAME STATE
// ============================================================
let G = null;

function newState() {
  return {
    phase: 'lobby',   // lobby | playing | roundEnd | gameOver
    players: [],      // [{name,hand,score,isBot,diff}]
    field: [],        // tiles not held by anyone
    turn: 0,          // index into players
    tphase: 'pick',   // pick | discard
    selIdx: -1,       // selected hand tile index (-1 = none)
    toastTm: null,
  };
}

// ============================================================
//  DECK  (42 tiles)
//  36 ordered pairs (i,j) 1≤i,j≤6 + 6 extra doubles = 42
// ============================================================
function makeDeck() {
  const d = [];
  let id = 0;
  for (let t = 1; t <= 6; t++)
    for (let b = 1; b <= 6; b++)
      d.push({id: id++, top: t, bot: b, flip: false});
  for (let i = 1; i <= 6; i++)
    d.push({id: id++, top: i, bot: i, flip: false});
  return shuffle(d);
}

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

// ============================================================
//  WIN CHECK
// ============================================================
function eff(t) { return t.flip ? t.bot : t.top; }

function checkWin(hand) {
  if (hand.length !== 6) return null;
  const v = hand.map(eff);

  // 六華: all effective same
  if (v.every(x => x === v[0])) return {role:'六華', pts:6};

  // 三連: sorted → two groups of 3 consecutive
  const s = [...v].sort((a,b)=>a-b);
  const cnt = {};
  s.forEach(x => cnt[x] = (cnt[x]||0)+1);
  const ks = Object.keys(cnt).map(Number).sort((a,b)=>a-b);
  if (ks.length===3 && ks.every(k=>cnt[k]===2) && ks[1]===ks[0]+1 && ks[2]===ks[1]+1)
    return {role:'三連', pts:3};

  // 一色: natural top all same OR natural bottom all same
  const tops = hand.map(t=>t.top);
  const bots = hand.map(t=>t.bot);
  if (tops.every(x=>x===tops[0]) || bots.every(x=>x===bots[0]))
    return {role:'一色', pts:2};

  return null;
}

// ============================================================
//  START GAME
// ============================================================
function startGame() {
  const name   = document.getElementById('pname').value.trim() || 'プレイヤー';
  const bcnt   = parseInt(document.getElementById('bcnt').value);
  const bdiff  = document.getElementById('bdiff').value;

  G = newState();
  G.players = [{name, hand:[], score:0, isBot:false}];
  for (let i = 0; i < bcnt; i++)
    G.players.push({name:BNAMES[i], hand:[], score:0, isBot:true, diff:bdiff});

  dealRound();
  G.phase = 'playing';
  G.turn  = 0;
  G.tphase= 'pick';
  G.selIdx= -1;

  showScreen('game');
  render();

  if (G.players[G.turn].isBot) scheduleBot();
}

function dealRound() {
  const deck = makeDeck();
  let idx = 0;
  G.players.forEach(p => { p.hand = deck.slice(idx, idx+5); idx += 5; });
  G.field = deck.slice(idx);
  G.selIdx = -1;
  G.tphase = 'pick';
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  renderHeader();
  renderOpponents();
  renderField();
  renderHand();
  renderStatus();
}

/* ----- Header / Scoreboard ----- */
function renderHeader() {
  document.getElementById('scoreboard').innerHTML = G.players.map((p,i) => {
    const active = i === G.turn;
    const cls = active ? (p.isBot ? 'active-bot' : 'active-human') : '';
    return `<div class="spill ${cls}">
      <span class="sn">${esc(p.name)}</span>
      <span class="sv">${p.score}</span>
    </div>`;
  }).join('');
}

/* ----- Opponents ----- */
function renderOpponents() {
  const el = document.getElementById('opp-area');
  const bots = G.players.filter(p => p.isBot);
  if (!bots.length) { el.innerHTML=''; return; }
  el.innerHTML = bots.map(p => {
    const pi = G.players.indexOf(p);
    const act = pi === G.turn;
    const backs = p.hand.map(() => '<div class="tback"></div>').join('');
    const dots  = act ? '<div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>' : '';
    return `<div class="ocard${act?' oactive':''}">
      <span class="oname">${esc(p.name)}</span>
      <div class="ohand">${backs}</div>
      ${dots}
      <span class="oscore">${p.score}点</span>
    </div>`;
  }).join('');
}

/* ----- Field ----- */
function renderField() {
  const canPick = G.turn===0 && G.tphase==='pick' && !G.players[0].isBot;
  document.getElementById('field-cnt').textContent = `${G.field.length}枚`;
  document.getElementById('field-grid').innerHTML =
    G.field.map((t,i) => tileSVG(t, canPick?`onclick="pickField(${i})"`:'', canPick?'pickable':'not-pick')).join('');
}

/* ----- Hand ----- */
function renderHand() {
  const p = G.players[0];
  document.getElementById('hand-tiles').innerHTML =
    p.hand.map((t,i) => {
      const sel = i===G.selIdx ? 'selected' : '';
      return tileSVG(t, `onclick="clickHand(${i})" oncontextmenu="flipHand(event,${i})"`, `htile ${sel}`);
    }).join('');

  const isMyDiscard = G.turn===0 && G.tphase==='discard';
  const hasSel = G.selIdx !== -1;
  const winRes = isMyDiscard ? checkWin(p.hand) : null;

  // 捨てる button: show only when my discard phase AND a tile is selected
  const db = document.getElementById('btn-discard');
  db.style.display = (isMyDiscard && hasSel) ? 'block' : 'none';

  // 上がる button
  const wb = document.getElementById('btn-win');
  wb.disabled = !(isMyDiscard && winRes);

  // Hint
  const hh = document.getElementById('hand-hint');
  if (isMyDiscard && winRes) {
    hh.textContent = `★ ${winRes.role}（${winRes.pts}点）上がれます！`;
    hh.className = 'can-win';
  } else {
    hh.textContent = `手牌 ${p.hand.length}枚`;
    hh.className = '';
  }
}

/* ----- Status bar ----- */
function renderStatus() {
  const el = document.getElementById('status');
  const myTurn = G.turn === 0 && !G.players[0].isBot;
  if (myTurn) {
    el.className = 'myturn';
    el.textContent = G.tphase==='pick'
      ? '場から牌を1枚選んでください'
      : '捨てる牌を選択 → 「捨てる」ボタン（右クリックで反転）';
  } else {
    el.className = 'boturn';
    el.textContent = `${G.players[G.turn].name} が考え中...`;
  }
}

/* ----- Tile HTML ----- */
function tileSVG(t, events='', extra='') {
  const tv = t.flip ? t.bot : t.top;
  const bv = t.flip ? t.top : t.bot;
  return `<div class="tile ${extra}" ${events}>
    <div class="th ${SCLS[tv]}">${SYM[tv]}</div>
    <div class="tb ${SCLS[bv]}">${SYM[bv]}</div>
  </div>`;
}

// ============================================================
//  HUMAN ACTIONS
// ============================================================

/* Click on a field tile → pick it */
function pickField(i) {
  if (G.phase!=='playing' || G.turn!==0 || G.tphase!=='pick') return;
  const p = G.players[0];
  if (p.hand.length >= 6) { toast('もう持てないよ'); return; }

  p.hand.push(G.field.splice(i, 1)[0]);
  G.tphase = 'discard';
  G.selIdx = -1;
  render();
}

/* Click on own hand tile → select / swap */
function clickHand(i) {
  if (G.phase !== 'playing') return;
  const prev = G.selIdx;
  if (prev === -1) {
    G.selIdx = i;
  } else if (prev === i) {
    G.selIdx = -1;   // deselect
  } else {
    // swap
    const h = G.players[0].hand;
    [h[prev], h[i]] = [h[i], h[prev]];
    G.selIdx = -1;
  }
  render();
}

/* Right-click on hand tile → flip */
function flipHand(e, i) {
  e.preventDefault();
  if (G.phase !== 'playing') return;
  G.players[0].hand[i].flip = !G.players[0].hand[i].flip;
  render();
  return false;
}

/* Discard selected tile */
function doDiscard() {
  if (G.tphase!=='discard' || G.turn!==0) return;
  const p = G.players[0];
  if (G.selIdx === -1) { toast('捨てる牌を選んでください'); return; }
  if (p.hand.length <= 5) { toast('これ以上捨てれないよ'); return; }

  G.field.push(p.hand.splice(G.selIdx, 1)[0]);
  G.selIdx = -1;
  nextTurn();
}

/* Declare win */
function doWin() {
  if (G.tphase!=='discard' || G.turn!==0) return;
  const res = checkWin(G.players[0].hand);
  if (!res) return;
  processWin(0, res);
}

// ============================================================
//  TURN MANAGEMENT
// ============================================================
function nextTurn() {
  G.turn = (G.turn + 1) % G.players.length;
  G.tphase = 'pick';
  G.selIdx = -1;
  render();
  if (G.players[G.turn].isBot) scheduleBot();
}

// ============================================================
//  BOT AI
// ============================================================
function scheduleBot() {
  if (G.phase !== 'playing') return;
  const bot = G.players[G.turn];
  if (!bot?.isBot) return;
  const delay = {easy:1400, normal:950, hard:550}[bot.diff] || 950;
  setTimeout(runBot, delay);
}

function runBot() {
  if (G.phase !== 'playing') return;
  const bot = G.players[G.turn];
  if (!bot?.isBot) return;
  const delay = {easy:1100, normal:750, hard:400}[bot.diff] || 750;

  /* ---- Pick phase ---- */
  if (G.tphase === 'pick') {
    if (G.field.length === 0) { nextTurn(); return; }

    const pi = bot.diff==='easy'
      ? Math.floor(Math.random() * G.field.length)
      : botPickIdx(bot, G.field, bot.diff);

    bot.hand.push(G.field.splice(pi, 1)[0]);
    G.tphase = 'discard';
    render();

    // Check immediate win
    const wr = checkWin(bot.hand);
    if (wr) { setTimeout(() => processWin(G.turn, wr), delay); return; }

    // Schedule discard
    setTimeout(() => {
      if (G.phase !== 'playing') return;
      const di = bot.diff==='easy'
        ? Math.floor(Math.random() * bot.hand.length)
        : botDiscardIdx(bot, bot.diff);
      G.field.push(bot.hand.splice(di, 1)[0]);
      render();
      setTimeout(nextTurn, 200);
    }, delay);
  }
}

/* Choose best field tile to pick */
function botPickIdx(bot, field, diff) {
  let best=-Infinity, bestI=0;
  field.forEach((t,i) => {
    const s = evalHand([...bot.hand, t], diff);
    if (s > best) { best=s; bestI=i; }
  });
  return bestI;
}

/* Choose worst hand tile to discard */
function botDiscardIdx(bot, diff) {
  let best=-Infinity, bestI=0;
  bot.hand.forEach((_,i) => {
    const s = evalHand(bot.hand.filter((_,j)=>j!==i), diff);
    if (s > best) { best=s; bestI=i; }
  });
  return bestI;
}

/* Score a hand (higher = better) */
function evalHand(hand, diff) {
  if (hand.length===6) {
    const w = checkWin(hand); if (w) return w.pts*100;
  }
  // Try flip combinations (limited for perf)
  let best = 0;
  const n = hand.length;
  const lim = diff==='hard' ? (1<<n) : Math.min(1<<n, 32);
  for (let m=0; m<lim; m++) {
    const h = hand.map((t,i) => ({...t, flip:!!(m&(1<<i))}));
    best = Math.max(best, scoreVals(h.map(eff)));
  }
  // Also check natural tops/bots
  best = Math.max(best, scoreVals(hand.map(t=>t.top)), scoreVals(hand.map(t=>t.bot)));
  return best;
}

function scoreVals(vs) {
  const freq = {};
  vs.forEach(v => freq[v]=(freq[v]||0)+1);
  const mf = Math.max(...Object.values(freq));
  // Consecutive-pair bonus
  const s = [...vs].sort((a,b)=>a-b);
  const cnt = {};
  s.forEach(v => cnt[v]=(cnt[v]||0)+1);
  const ks = Object.keys(cnt).map(Number).sort((a,b)=>a-b);
  let cp = 0;
  for (let i=0; i<ks.length-1; i++)
    if (ks[i+1]===ks[i]+1 && cnt[ks[i]]>=2 && cnt[ks[i+1]]>=2) cp++;
  return mf*20 + cp*15;
}

// ============================================================
//  WIN PROCESSING
// ============================================================
function processWin(pi, res) {
  G.phase = 'roundEnd';
  const p = G.players[pi];
  p.score += res.pts;
  showWinModal(p, res);
}

// ============================================================
//  MODALS
// ============================================================
function showWinModal(p, res) {
  const rows = G.players.map(pl =>
    `<tr><td>${esc(pl.name)}</td><td>${pl.score}点</td></tr>`).join('');
  const tiles = p.hand.map(t => tileSVG(t,'','htile')).join('');
  const over = p.score >= WIN_SCORE;

  document.getElementById('mbox').innerHTML = `
    <div class="mtitle">${p.isBot?'🤖':'🎆'} 上がり！</div>
    <p style="color:#8a7860;font-size:.83rem">${esc(p.name)} が役を完成</p>
    <div class="mrole">${res.role}</div>
    <div class="mpts">+${res.pts}点</div>
    <div class="mhand">${tiles}</div>
    <table class="mscores">${rows}</table>
    ${over
      ? `<button class="mbtn" onclick="showGameOver()">ゲーム終了を確認</button>`
      : `<button class="mbtn" onclick="doNextRound()">次のゲームへ</button>`}
  `;
  document.getElementById('modal').classList.add('open');
}

function showGameOver() {
  const winner = G.players.reduce((a,b)=>a.score>b.score?a:b);
  const rows = G.players.map(p =>
    `<tr><td>${esc(p.name)}</td><td>${p.score}点</td></tr>`).join('');
  document.getElementById('mbox').innerHTML = `
    <div class="mtitle">🏆 ゲーム終了！</div>
    <div style="font-size:1.5rem;color:#f5e0a0;margin:.5rem 0;font-family:'Hiragino Mincho ProN','Yu Mincho',serif">${esc(winner.name)} の勝利！</div>
    <table class="mscores">${rows}</table>
    <button class="mbtn" onclick="goLobby()">もう一度</button>
  `;
}

function doNextRound() {
  document.getElementById('modal').classList.remove('open');
  dealRound();
  G.phase = 'playing';
  G.turn  = 0;
  render();
  if (G.players[G.turn].isBot) scheduleBot();
}

function goLobby() {
  document.getElementById('modal').classList.remove('open');
  showScreen('lobby');
}

// ============================================================
//  UTILS
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let _toastTm = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTm);
  _toastTm = setTimeout(()=>el.classList.remove('show'), 2200);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Long-press for mobile right-click (flip)
let _lpTm = null;
document.addEventListener('touchstart', e => {
  const tile = e.target.closest('#hand-tiles .tile');
  if (!tile) return;
  _lpTm = setTimeout(() => {
    const tiles = [...document.querySelectorAll('#hand-tiles .tile')];
    const i = tiles.indexOf(tile);
    if (i >= 0) { G.players[0].hand[i].flip = !G.players[0].hand[i].flip; render(); }
  }, 600);
}, {passive:true});
document.addEventListener('touchend', () => clearTimeout(_lpTm), {passive:true});
document.addEventListener('touchmove', () => clearTimeout(_lpTm), {passive:true});
</script>
